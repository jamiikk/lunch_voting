<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lunch time!</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            margin-bottom: 3rem;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .search-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 8px;
            border-radius: 16px;
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 600px;
            transition: border-color 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--primary);
        }

        .search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: var(--primary-hover);
        }

        .restaurant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .restaurant-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .restaurant-card h2 {
            margin: 0 0 16px 0;
            font-size: 1.5rem;
            color: #fff;
        }

        .menu-items {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .menu-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item .name {
            color: var(--text-main);
        }

        .menu-item .price {
            color: #fbbf24;
            font-weight: 600;
        }

        .vote-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .vote-btn:hover {
            background: var(--primary-hover);
        }

        .vote-btn:active {
            transform: scale(0.98);
        }

        #live-results {
            margin-top: 4rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
        }

        #live-results h3 {
            margin-top: 0;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.875rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .address {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .distance {
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            padding: 2px 8px;
            border-radius: 99px;
            margin-left: 8px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 50;
        }

        .floating-chart {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 320px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .floating-chart:hover {
            transform: scale(1.02);
        }

        .floating-chart h4 {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }

        @media (max-width: 1100px) {
            .floating-chart {
                display: none;
            }
        }

        .restaurant-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            background: rgba(99, 102, 241, 0.1);
        }

        .submit-bar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 99px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            border: none;
            font-size: 1.1rem;
        }

        .submit-bar.visible {
            transform: translateX(-50%) translateY(0);
        }

        .submit-bar:hover {
            background: var(--primary-hover);
            transform: translateX(-50%) translateY(-5px);
        }

        .vote-btn.selected {
            background: #10b981;
        }

        .reset-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1>Lunch time!</h1>
            <p
                style="font-size: 0.9rem; color: var(--text-muted); margin-top: -1.2rem; transform: translateX(60px); opacity: 0.8; font-style: italic;">
                ... your vote matters
            </p>
        </div>

        <div class="search-container">
            <div style="width: 100%; max-width: 600px;">
                <form th:action="@{${sessionId == 'global' ? '/vote' : '/vote/' + sessionId}}" method="get" class="search-box">
                    <input type="text" name="address" class="search-input"
                        placeholder="Enter your address (e.g. Purkyňova 123)..." th:value="${address}"
                        list="suggestions" autocomplete="off" hx-get="/api/address/suggestions"
                        hx-trigger="keyup changed delay:1200ms" hx-target="#suggestions" hx-swap="innerHTML">
                    <button type="submit" class="search-btn">Find Lunch</button>
                    <datalist id="suggestions">
                        <th:block th:fragment="address-options">
                            <option th:each="s : ${suggestions}" th:value="${s.displayName}"></option>
                        </th:block>
                    </datalist>
                </form>
                <div th:if="${error}"
                    style="text-align: center; margin-top: 12px; color: #fb7185; font-size: 0.9rem; font-weight: 500;"
                    th:text="${error}"></div>
            </div>
        </div>

        <div class="restaurant-grid" id="restaurants">
            <div th:each="restaurant : ${restaurants}" class="restaurant-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <h2 th:text="${restaurant.name}"></h2>
                    <span th:if="${restaurant.latitude != null}" class="distance">
                        <span
                            th:with="dist=${@distanceUtils.calculateDistance(targetLat, targetLon, restaurant.latitude, restaurant.longitude)}"
                            th:text="${#numbers.formatDecimal(dist, 1, 1) + ' km'}"></span>
                    </span>
                </div>
                <div class="address" th:text="${restaurant.address}"></div>
                <div class="menu-items">
                    <div th:each="item : ${restaurant.menu}" class="menu-item">
                        <span class="name" th:text="${item.name}"></span>
                        <span class="price" th:text="${item.price}"></span>
                    </div>
                </div>
                <button class="vote-btn" 
                    th:data-id="${restaurant.id}"
                    onclick="toggleSelection(this.getAttribute('data-id'), this)">
                    Select for Lunch
                </button>
            </div>
        </div>

        <div id="vote-data" style="display: none;">
            <input type="hidden" id="final-restaurant-ids" name="restaurantId" value="">
            <input type="hidden" name="sessionId" th:value="${sessionId}">
        </div>

        <button id="submit-votes-btn" class="submit-bar" 
                hx-post="/api/votes" 
                hx-include="#vote-data"
                hx-headers='js:{"X-Voter-GUID": getVoterGuid()}'
                hx-target="#msg">
            <span>🚀</span>
            <span>Vote for <span id="selection-count">0</span> selections</span>
        </button>

        <div class="floating-chart">
            <h4>Live Results</h4>
            <canvas id="votePieChart"></canvas>
            <button class="reset-btn" 
                    hx-post="/api/votes/reset" 
                    hx-include="#vote-data"
                    hx-headers='js:{"X-Voter-GUID": getVoterGuid()}'
                    hx-target="#msg">
                Reset my votes
            </button>
        </div>

        <script>
            const selectedIds = new Set();

            function toggleSelection(id, btn) {
                const card = btn.closest('.restaurant-card');
                if (selectedIds.has(id)) {
                    selectedIds.delete(id);
                    card.classList.remove('selected');
                    btn.classList.remove('selected');
                    btn.innerText = 'Select for Lunch';
                } else {
                    selectedIds.add(id);
                    card.classList.add('selected');
                    btn.classList.add('selected');
                    btn.innerText = 'Selected';
                }
                
                const count = selectedIds.size;
                document.getElementById('selection-count').innerText = count;
                document.getElementById('final-restaurant-ids').value = Array.from(selectedIds).join(",");
                
                const submitBtn = document.getElementById('submit-votes-btn');
                if (count > 0) {
                    submitBtn.classList.add('visible');
                } else {
                    submitBtn.classList.remove('visible');
                }
            }

            function getVoterGuid() {
                let guid = localStorage.getItem('voter_guid');
                if (!guid) {
                    guid = 'v-' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    localStorage.setItem('voter_guid', guid);
                }
                return guid;
            }

            let voteChart = null;
            function updateChart(dataStr) {
                try {
                    const data = JSON.parse(dataStr);
                    delete data._sessionId;
                    
                    const labels = [];
                    const values = [];
                    
                    for (const [id, count] of Object.entries(data)) {
                        const voteCount = parseInt(count);
                        if (isNaN(voteCount) || voteCount <= 0) continue;

                        const el = document.querySelector(`[data-id="${id}"]`);
                        const name = el ? el.closest('.restaurant-card').querySelector('h2').innerText : id;
                        labels.push(name);
                        values.push(voteCount);
                    }

                    if (!voteChart) {
                        const ctx = document.getElementById('votePieChart').getContext('2d');
                        voteChart = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels,
                                datasets: [{
                                    data: values,
                                    backgroundColor: [
                                        '#6366f1', '#f472b6', '#fbbf24', '#10b981', '#3b82f6', 
                                        '#8b5cf6', '#ec4899', '#f59e0b', '#60a5fa', '#34d399'
                                    ],
                                    borderWidth: 2,
                                    borderColor: 'rgba(30, 41, 59, 0.5)'
                                }]
                            },
                            options: {
                                responsive: true,
                                cutout: '70%',
                                plugins: {
                                    legend: {
                                        display: true,
                                        position: 'bottom',
                                        labels: {
                                            color: '#94a3b8',
                                            padding: 15,
                                            font: { family: 'Outfit', size: 10 },
                                            usePointStyle: true
                                        }
                                    }
                                }
                            }
                        });
                    } else {
                        voteChart.data.labels = labels;
                        voteChart.data.datasets[0].data = values;
                        voteChart.update();
                    }
                } catch (e) {
                    console.error("Failed to update chart", e);
                }
            }

            // Listen for SSE messages via HTMX
            document.body.addEventListener('htmx:sseMessage', function(e) {
                if (e.detail.type === 'message') {
                    updateChart(e.detail.data);
                }
            });

            // Reset after successful vote
            document.body.addEventListener('htmx:afterRequest', function(evt) {
                if (evt.target.id === 'submit-votes-btn' && evt.detail.successful) {
                    selectedIds.clear();
                    document.getElementById('final-restaurant-ids').value = "";
                    document.querySelectorAll('.restaurant-card.selected').forEach(c => c.classList.remove('selected'));
                    document.querySelectorAll('.vote-btn.selected').forEach(b => {
                        b.classList.remove('selected');
                        b.innerText = 'Select for Lunch';
                    });
                    document.getElementById('submit-votes-btn').classList.remove('visible');
                }
            });
        </script>

        <div id="msg"></div>

        <div id="live-results" hx-ext="sse" th:attr="sse-connect='/api/votes/live?sessionId=' + ${sessionId}" style="display: none;">
            <!-- SSE connection only, UI is in floating-chart -->
            <div sse-swap="message"></div>
        </div>
    </div>
</body>

</html>
