<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lunch Voting - Start Here</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .landing-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
        }

        #voting-url {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        #voting-url:focus {
            border-color: var(--primary);
        }

        .generate-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .generate-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        .copy-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="landing-card">
        <h1>Lunch Voting</h1>
        <p>Create a shared voting room and decide where to eat today with your colleagues.</p>

        <div class="input-group">
            <input type="text" id="voting-url" placeholder="Your unique URL will appear here..." readonly>
            <button class="generate-btn" 
                    hx-post="/api/sessions" 
                    hx-target=".input-group" 
                    hx-swap="innerHTML">
                Generate Voting Link
            </button>
        </div>
        
        <p style="font-size: 0.9rem; margin-top: 2rem;">
            <a href="/vote" style="color: var(--primary); text-decoration: none; font-weight: 500;">Or join the global vote &rarr;</a>
        </p>
    </div>

    <script>
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.target.id === 'voting-url') {
                // Select the text for the user
                evt.detail.target.select();
                // We could add a "copied to clipboard" toast here
            }
        });
    </script>
</body>

</html>
